services:
  - type: web
    name: pan-afrik-store
    runtime: node # Explicitly set your runtime
    plan: starter # Changed to starter for private network support
    region: frankfurt
    envVars:
      - key: REDIS_URL
        fromService:
          type: keyvalue # Use 'keyvalue' for Redis
          name: panafrik-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: EXCHANGE_RATE_API_KEY
        sync: false

  - type: keyvalue # Modern name for Redis
    name: panafrik-redis
    plan: free
    ipAllowList: [] # Stays private